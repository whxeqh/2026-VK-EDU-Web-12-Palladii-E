{% load static %}
<div class="card mt-3 p-3 border-dark">
    <div class="d-flex gap-3">
        <div class="d-flex flex-column align-items-center gap-2">
            <img src="{% static 'img/card-img.jpg' %}" class="card-img" alt="card image">
            <div class="d-flex align-items-center border rounded like-widget">
                <span class="fw-semibold px-3">{{ question.likes }}</span>
                <div class="vr"></div>
                <div class="d-flex flex-column flex-grow-1">
                    <button class="btn btn-sm py-1 border-bottom rounded-0 w-100">▲</button>
                    <button class="btn btn-sm py-1 rounded-0 w-100">▼</button>
                </div>
            </div>
        </div>
        <div class="d-flex flex-column gap-1">
            <a href="{% url 'question' question.id %}" class="fw-semibold fs-5">{{ question.title }}</a>
            <p class="text-muted mb-1">{{ question.text }}</p>
            <div class="d-flex flex-column gap-3">
                <div class="d-flex gap-3 align-items-center">
                    <a href="{% url 'question' question.id %}" class="text-primary small">answer ({{ question.answers }})</a>
                    <div class="d-flex gap-2">
                        <span class="small">Tags:</span>
                        {% for tag in question.tags %}
                        <a href="{% url 'tag' tag %}" class="small">{{ tag }}</a>
                        {% endfor %}
                    </div>
                </div>
                <div class="d-flex gap-3 align-items-center">
                    <span class="small">Published:</span>
                    <span class="text-muted small">{{ question.created_at }}</span>
                </div>
            </div>
        </div>
    </div>
</div>

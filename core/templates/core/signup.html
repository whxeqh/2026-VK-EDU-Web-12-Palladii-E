{% extends "base.html" %}

{% block title %}AskPupkin New Question{% endblock %}

{% block content %}

<h2 class="mb-3">Registration</h2>

<div class="text-danger mb-3">Sorry, this email address already registered!</div>

<div class="d-flex flex-column gap-3" style="max-width: 450px;">

    <div class="d-flex align-items-center gap-3">
        <label style="min-width: 150px;">Login</label>
        <div class="flex-grow-1">
            <input type="text" class="form-control border-dark" value="dr_pepper">
        </div>
    </div>

    <div class="d-flex align-items-start gap-3">
        <label class="pt-2" style="min-width: 150px;">Email</label>
        <div class="flex-grow-1">
            <input type="email" class="form-control is-invalid" value="dr.pepper@mail.ru">
            <div class="invalid-feedback">Invalid email address</div>
        </div>
    </div>

    <div class="d-flex align-items-center gap-3">
        <label style="min-width: 150px;">NickName</label>
        <div class="flex-grow-1">
            <input type="text" class="form-control border-dark" value="Dr. Pepper">
        </div>
    </div>

    <div class="d-flex align-items-center gap-3">
        <label style="min-width: 150px;">Password</label>
        <div class="flex-grow-1">
            <input type="password" class="form-control border-dark" placeholder="••••••••">
        </div>
    </div>

    <div class="d-flex align-items-center gap-3">
        <label style="min-width: 150px;">Repeat password</label>
        <div class="flex-grow-1">
            <input type="password" class="form-control border-dark" placeholder="••••••••">
        </div>
    </div>

    <div class="d-flex align-items-center gap-3">
        <label style="min-width: 150px;">Upload avatar</label>
        <div class="flex-grow-1">
            <input type="file" class="form-control border-dark" accept="image/*">
        </div>
    </div>

    <div style="margin-left: 163px;">
        <button class="button btn btn-secondary">Register!</button>
    </div>

</div>

{% endblock %}

{% extends "base.html" %}

{% block title %}AskPupkin New Question{% endblock %}

{% block content %}

<h1 class="mb-3">Log in</h1>

<div class="text-danger mb-3">Sorry, wrong password!</div>

<div class="d-flex flex-column gap-3" style="max-width: 450px;">

    <div class="d-flex align-items-center gap-3">
        <label style="min-width: 150px;">Login</label>
        <div class="flex-grow-1">
            <input type="text" class="form-control border-dark" value="Enter your login here">
        </div>
    </div>

    <div class="d-flex align-items-center gap-3">
        <label style="min-width: 150px;">Password</label>
        <div class="flex-grow-1">
            <input type="password" class="form-control border-dark" placeholder="••••••••">
        </div>
    </div>

    <div>
        <div class="d-flex flex-column" style="margin-left: 166px;">
            <button class="button btn btn-secondary">Register!</button>
            <a href="{% url 'signup' %}" class="mt-4">create new account</a>
        </div>
    </div>

</div>

{% endblock %}

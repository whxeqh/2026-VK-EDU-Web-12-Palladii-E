{% extends "base.html" %}
{% load static %}

{% block title %}AskPupkin New Question{% endblock %}

{% block content %}

<h1 class="mb-3">Settings: Данил Колбасенко</h1>

<div class="text-danger mb-3">Sorry, wrong password!</div>

<div class="d-flex flex-column gap-3" style="max-width: 450px;">

    <div class="d-flex align-items-center gap-3">
        <label style="min-width: 150px;">Login</label>
        <div class="flex-grow-1">
            <input type="text" class="form-control border-dark" value="dr_pepper">
        </div>
    </div>

    <div class="d-flex align-items-center gap-3">
        <label style="min-width: 150px;">Email</label>
        <div class="flex-grow-1">
            <input type="text" class="form-control border-dark" value="dr.pepper@mail.ru">
        </div>
    </div>

    <div class="d-flex align-items-center gap-3">
        <label style="min-width: 150px;">NickName</label>
        <div class="flex-grow-1">
            <input type="text" class="form-control border-dark" value="Dr.Perpper">
        </div>
    </div>

    <div class="d-flex align-items-start gap-3">
        <label style="min-width: 150px;">Upload avatar</label>
        <div class="flex-grow-1 d-flex flex-column gap-2">
            <img src="{% static 'img/avatar.png' %}" class="avatar" alt="avatar" style="width: 150px; height: 150px;">
            <div class="flex-grow-1">
                <input type="file" class="form-control border-dark" accept="image/*">
            </div>
        </div>
    </div>

    <div>
        <div class="d-flex flex-column" style="margin-left: 166px;">
            <button class="button btn btn-secondary">Save</button>
        </div>
    </div>

</div>

{% endblock %}

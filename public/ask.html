<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskPupkin — New Question</title>
    <link rel="icon" href="static/img/favicon.png">
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg main-navbar">
        <div class="container-xxl">
            <a class="navbar-brand fw-bold fs-1" href="index.html">AskPupkin</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <div class="d-flex align-items-center w-100 gap-3">

                    <!-- поиск -->
                    <form class="d-flex flex-grow-1 search-form">
                        <input class="form-control search-input"
                               type="search"
                               placeholder="Search">
                    </form>

                    <!-- кнопка -->
                    <a href="ask.html" class="btn btn-success button fw-bold">ASK!</a>

                    <!-- профиль справа -->
                    <div class="d-flex align-items-center me-4">
                        <div class="ms-3">
                            <div>
                                <a href="login.html" class="me-2">login</a>
                                <a href="signup.html">register</a>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </nav>
</header>

<main class="main-container mt-5">
    <div class="container-xxl">
        <div class="row">

            <div class="col-12 col-lg-9">
                <div class="d-flex align-items-center mb-3">
                    <h1>New Question</h1>
                </div>

                <div class="d-flex flex-column gap-3" style="max-width: 600px;">

                    <div class="d-flex align-items-start gap-3">
                        <label class="pt-2" style="min-width: 60px;">Title</label>
                        <div class="flex-grow-1">
                            <input type="text" class="form-control"
                                   placeholder="How to build a moon park?"
                                   maxlength="255">
                            <div class="form-text">Max 255 characters</div>
                        </div>
                    </div>

                    <div class="d-flex align-items-start gap-3">
                        <label class="pt-2" style="min-width: 60px;">Text</label>
                        <div class="flex-grow-1">
                            <textarea class="form-control" rows="8"
                                      placeholder="Describe your question in detail..."></textarea>
                        </div>
                    </div>

                    <div class="d-flex align-items-start gap-3">
                        <label class="pt-2" style="min-width: 60px;">Tags</label>
                        <div class="flex-grow-1">
                            <input type="text" class="form-control"
                                   placeholder="moon, park, puzzle">
                            <div class="form-text">Separate tags with commas</div>
                        </div>
                    </div>

                    <div class="ms-5 ps-4">
                        <button class="btn btn-secondary">ASK!</button>
                    </div>

                </div>
            </div>

            <!-- sidebar-->
            <div class="col-12 col-lg-3 justify-content-center">
                <h5 class="fw-bold">Popular Tags</h5>
                <div class="d-flex flex-wrap gap-2 mb-4">
                    <a href="#" class="text-dark text-decoration-none">perl</a>
                    <a href="#" class="text-danger fw-semibold text-decoration-none">python</a>
                    <a href="#" class="text-dark text-decoration-none">TechnoPark</a>
                    <a href="#" class="text-danger fw-semibold text-decoration-none">MySQL</a>
                    <a href="#" class="text-success text-decoration-none">django</a>
                    <a href="#" class="text-dark text-decoration-none">C++</a>
                    <a href="#" class="text-danger fw-semibold text-decoration-none">C#</a>
                    <a href="#" class="text-dark text-decoration-none">F#</a>
                    <a href="#" class="text-danger fw-semibold text-decoration-none">NASM</a>
                    <a href="#" class="text-success text-decoration-none">Rust</a>

                </div>

                <h5 class="fw-bold">Best Members</h5>
                <ul class="list-unstyled">
                    <li class="mb-1"><a href="#" class="text-primary">Поздышев Александр</a></li>
                    <li class="mb-1"><a href="#" class="text-primary">Опритов Артём</a></li>
                    <li class="mb-1"><a href="#" class="text-primary">Виндман Александр</a></li>
                    <li class="mb-1"><a href="#" class="text-primary">Пивоварова Саша</a></li>
                    <li class="mb-1"><a href="#" class="text-primary">Клименков Артём</a></li>
                </ul>
            </div>
        </div>
    </div>

</main>


<footer class="border-top py-3 text-center text-muted small mt-auto">
    2026 AskPupkin
</footer>

<script src="static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
